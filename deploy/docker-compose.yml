version: "3.9"

# Local development stack for the Ethiopian Neobank backend.
# Start with: docker compose -f deploy/docker-compose.yml up -d

services:
  # --- PostgreSQL State Database ---
  postgres:
    image: postgres:16-alpine
    container_name: neo-postgres
    environment:
      POSTGRES_USER: neobank
      POSTGRES_PASSWORD: neobank_dev
      POSTGRES_DB: neobank
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neobank"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Formance Ledger (Community Edition) ---
  formance-ledger:
    image: ghcr.io/formancehq/ledger:v2.2.1
    container_name: neo-formance-ledger
    command: ["serve", "--auto-upgrade"]
    environment:
      POSTGRES_URI: "postgres://formance:formance_dev@formance-postgres:5432/formance?sslmode=disable"
    ports:
      - "3068:3068"
    depends_on:
      formance-postgres:
        condition: service_healthy

  formance-postgres:
    image: postgres:16-alpine
    container_name: neo-formance-postgres
    environment:
      POSTGRES_USER: formance
      POSTGRES_PASSWORD: formance_dev
      POSTGRES_DB: formance
    ports:
      - "5433:5432"
    volumes:
      - formance_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U formance"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Redis Cache ---
  redis:
    image: redis:7-alpine
    container_name: neo-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Neobank API Server ---
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: api
    container_name: neo-api
    environment:
      LISTEN_ADDR: ":8080"
      DATABASE_URL: "postgres://neobank:neobank_dev@postgres:5432/neobank?sslmode=disable"
      FORMANCE_URL: "http://formance-ledger:3068"
      FORMANCE_LEDGER_NAME: "neobank"
      FORMANCE_ACCOUNT_PREFIX: "neo"
      JWT_SECRET: ""
      RATE_LIMIT_RPS: "50"
      RATE_LIMIT_BURST: "100"
      REDIS_URL: "redis://redis:6379/0"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      formance-ledger:
        condition: service_started
      redis:
        condition: service_healthy

volumes:
  pgdata:
  formance_pgdata:
  redisdata:
